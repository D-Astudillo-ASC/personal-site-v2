name: Auto-merge Dependabot patch and security PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge-security:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'

    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide if PR should auto-merge
        id: decide
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: |
          set -euo pipefail
          merge=false
          title="${PR_TITLE:-}"
          body="${PR_BODY:-}"
          combined="${title} ${body}"
          ut="${UPDATE_TYPE:-}"

          if [ "$ut" = "version-update:semver-patch" ]; then
            merge=true
            echo "reason=semver-patch (Dependabot metadata)" >> "$GITHUB_OUTPUT"
          elif echo "$combined" | grep -qiE 'CVE-[0-9]{4}-[0-9]+|GHSA-[0-9A-Za-z-]{4,}|github\.com/advisories/|github\.com/[^[:space:]]+/[^[:space:]]+/security/advisories/'; then
            merge=true
            echo "reason=security advisory signal in PR" >> "$GITHUB_OUTPUT"
          elif echo "$title" | grep -qiE '\(patch\)'; then
            merge=true
            echo "reason=PR title contains (patch)" >> "$GITHUB_OUTPUT"
          else
            echo "reason=not eligible" >> "$GITHUB_OUTPUT"
          fi

          echo "merge=$merge" >> "$GITHUB_OUTPUT"
          echo "update-type=$ut merge=$merge"

      - name: Wait for status checks
        if: steps.decide.outputs.merge == 'true'
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-regexp: ".*"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          allowed-conclusions: success,neutral,skipped

      - name: Auto-merge eligible Dependabot PR
        if: steps.decide.outputs.merge == 'true'
        uses: actions/github-script@v7
        env:
          MERGE_TITLE: ${{ github.event.pull_request.title }}
        with:
          script: |
            const prNumber = context.issue.number;
            const title = process.env.MERGE_TITLE || context.payload.pull_request.title;

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: title,
              });
              console.log('Eligible Dependabot PR merged successfully');
            } catch (error) {
              if (error.status === 405) {
                console.log('PR cannot be merged (branch protection or reviews may be required).');
              } else if (error.status === 409) {
                console.log('PR is not mergeable (conflicts or pending checks).');
              } else {
                console.error('Merge error:', error.message);
                throw error;
              }
            }
